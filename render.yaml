services:
  - type: web
    name: vibecheck-web
    env: docker
    rootDir: .
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /root/.cache/ms-playwright
      - key: PORT
        value: 3000

  - type: web
    name: vibecheck-api
    env: docker
    rootDir: .
    dockerfilePath: apps/api/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /root/.cache/ms-playwright
      - key: PORT
        value: 4000
      - key: LOG_LEVEL
        value: info
